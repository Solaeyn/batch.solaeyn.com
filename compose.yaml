services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: batch-solaeyn-builder:local
    container_name: batch-solaeyn-builder
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3020
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/solaeyn}
      BATCH_DATABASE_URL: ${BATCH_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/solaeyn}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      AUTH_LOGIN_URL: ${AUTH_LOGIN_URL:-https://solaeyn.com/login}
    ports:
      - "${PORT:-3020}:3020"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: batch-solaeyn-postgres
    environment:
      POSTGRES_DB: solaeyn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d solaeyn"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: batch-solaeyn-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  postgres_data:
