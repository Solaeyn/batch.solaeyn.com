<section class="overview-panel">
  <div class="section-head">
    <div>
      <span class="section-label">Workspace</span>
      <h2>Summary</h2>
    </div>
    <span class="section-badge muted" id="overviewUpdated">Loading</span>
  </div>

  <div class="summary-grid" id="overviewSummary">
    <div class="summary-card card-amber"><strong id="statScripts">--</strong><p>Saved scripts</p><small>Batch files in your workspace</small></div>
    <div class="summary-card card-green"><strong id="statBlocks">--</strong><p>Total blocks</p><small>Commands across all scripts</small></div>
    <div class="summary-card"><strong id="statLimit">--</strong><p>Script capacity</p><small>Maximum scripts per account</small></div>
    <div class="summary-card"><strong id="statLast">--</strong><p>Last edited</p><small>Most recent script update</small></div>
  </div>
</section>

<section class="overview-panel">
  <div class="section-head">
    <div>
      <span class="section-label">Recent</span>
      <h2>Latest scripts</h2>
    </div>
    <a class="btn btn-ghost btn-compact" href="/home/scripts">View all</a>
  </div>

  <div class="script-list" id="recentScripts">
    <p class="empty-state">Loading recent scripts…</p>
  </div>
</section>
