<section class="overview-panel">
  <div class="section-head">
    <div>
      <span class="section-label">Library</span>
      <h2>Your scripts</h2>
    </div>
    <span class="section-badge muted" id="scriptsCount">0 scripts</span>
  </div>

  <div class="scripts-toolbar">
    <input id="scriptSearch" class="text-input" type="search" placeholder="Search scripts by name…" autocomplete="off" />
  </div>

  <div class="script-list" id="scriptsList">
    <p class="empty-state">Loading scripts…</p>
  </div>
</section>
